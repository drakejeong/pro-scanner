<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO Scanner - 신규 상품 모니터링</title>
    <!-- 파비콘 (SVG 인라인) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%232563eb'/><path d='M28 30h24c8 0 14 5 14 13s-6 13-14 13H38v14H28V30zm10 18h13c3 0 5-2 5-5s-2-5-5-5H38v10z' fill='white'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%232563eb'/><path d='M28 30h24c8 0 14 5 14 13s-6 13-14 13H38v14H28V30zm10 18h13c3 0 5-2 5-5s-2-5-5-5H38v10z' fill='white'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+KR:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        #modal.hidden, #edit-modal.hidden, #confirm-modal.hidden, #toast.hidden { display: none; }
    </style>
</head>
<body class="min-h-screen bg-[#f8fafc] text-slate-900 selection:bg-blue-100">

    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-blue-100/50 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-indigo-100/50 rounded-full blur-3xl"></div>
    </div>

    <div id="app" class="relative max-w-6xl mx-auto px-4 py-10">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
            <div class="space-y-2">
                <div class="flex items-center gap-3">
                    <div class="p-3 bg-blue-600 rounded-2xl shadow-blue-200 shadow-xl">
                        <i data-lucide="zap" class="text-white w-6 h-6"></i>
                    </div>
                    <h1 class="text-4xl font-black tracking-tight text-slate-800">
                        PRO<span class="text-blue-600">Scanner</span>
                    </h1>
                </div>
                <p class="text-slate-500 font-medium ml-1">서버 자동 모니터링 (1시간 주기) · 텔레그램 알림</p>
            </div>
            <div class="flex flex-wrap items-center gap-4">
                <div class="flex items-center gap-4 bg-white/90 backdrop-blur-md px-6 py-4 rounded-2xl border border-slate-200 shadow-sm">
                    <div class="flex items-center gap-2">
                        <div id="status-indicator" class="w-2.5 h-2.5 rounded-full bg-slate-400"></div>
                        <span id="status-text" class="text-sm font-black text-slate-700 uppercase">Connecting...</span>
                    </div>
                </div>
                <button onclick="toggleModal(true)" class="group flex items-center gap-2 bg-slate-900 hover:bg-black text-white px-7 py-4 rounded-2xl transition-all shadow-xl hover:shadow-2xl active:scale-95">
                    <i data-lucide="plus" class="group-hover:rotate-90 transition-transform"></i>
                    <span class="font-bold">사이트 추가</span>
                </button>
            </div>
        </header>

        <!-- Site Grid -->
        <div id="site-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
            <div class="col-span-full py-32 text-center bg-white/50 border-2 border-dashed border-slate-300 rounded-[2.5rem] backdrop-blur-sm">
                <i data-lucide="loader-2" class="w-16 h-16 text-blue-300 mx-auto mb-4 animate-spin"></i>
                <h3 class="text-xl font-bold text-slate-400">Firebase 연결 중...</h3>
            </div>
        </div>
    </div>

    <!-- Add Site Modal -->
    <div id="modal" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="toggleModal(false)"></div>
        <div class="relative bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold tracking-tight">새 사이트 등록</h2>
                    <button onclick="toggleModal(false)" class="p-2 hover:bg-slate-100 rounded-full"><i data-lucide="x"></i></button>
                </div>
                <div class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="text-sm font-bold text-slate-500 ml-1">브랜드 명칭</label>
                        <input id="new-site-name" type="text" placeholder="예: 나이키 코리아" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-sm font-bold text-slate-500 ml-1">대상 URL (신상품 페이지 URL 권장)</label>
                        <input id="new-site-url" type="url" placeholder="https://..." class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all font-mono text-sm">
                    </div>
                </div>
                <button onclick="addSite()" class="w-full mt-8 py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold shadow-lg shadow-blue-100 transition-all active:scale-[0.98]">
                    클라우드 등록
                </button>
                <p class="text-xs text-slate-400 mt-4 text-center">등록 후 다음 정시 스캔에 자동 반영됩니다.</p>
            </div>
        </div>
    </div>

    <!-- Edit Site Modal -->
    <div id="edit-modal" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="closeEditModal()"></div>
        <div class="relative bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold tracking-tight">사이트 수정</h2>
                    <button onclick="closeEditModal()" class="p-2 hover:bg-slate-100 rounded-full"><i data-lucide="x"></i></button>
                </div>
                <div class="space-y-4">
                    <div class="space-y-1.5">
                        <label class="text-sm font-bold text-slate-500 ml-1">브랜드 명칭</label>
                        <input id="edit-site-name" type="text" placeholder="예: 나이키 코리아" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-sm font-bold text-slate-500 ml-1">대상 URL</label>
                        <input id="edit-site-url" type="url" placeholder="https://..." class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-200 focus:border-blue-500 focus:ring-4 focus:ring-blue-50 outline-none transition-all font-mono text-sm">
                    </div>
                </div>
                <button onclick="saveSiteEdit()" class="w-full mt-8 py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold shadow-lg shadow-blue-100 transition-all active:scale-[0.98]">
                    저장
                </button>
                <p class="text-xs text-slate-400 mt-4 text-center">URL 변경 시 다음 스캔에서 새로 크롤링됩니다.</p>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div class="relative bg-white w-full max-w-sm rounded-3xl shadow-2xl p-8 text-center">
            <div class="w-16 h-16 bg-red-50 text-red-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
                <i data-lucide="alert-triangle" class="w-8 h-8"></i>
            </div>
            <h3 class="text-xl font-bold mb-2">정말 삭제할까요?</h3>
            <p class="text-slate-500 text-sm mb-8 font-medium">데이터베이스에서 영구히 삭제됩니다.</p>
            <div class="flex gap-3">
                <button onclick="closeConfirm()" class="flex-1 py-4 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-2xl font-bold transition-all">취소</button>
                <button id="confirm-delete-btn" class="flex-1 py-4 bg-red-600 hover:bg-red-700 text-white rounded-2xl font-bold shadow-lg shadow-red-100 transition-all">삭제</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed top-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl z-[300] flex items-center gap-3 cursor-pointer" onclick="hideToast()">
        <i data-lucide="bell" id="toast-icon" class="text-blue-400 w-5 h-5 shrink-0"></i>
        <span id="toast-message" class="font-medium text-sm"></span>
        <i data-lucide="x" class="w-4 h-4 text-slate-500 ml-2"></i>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfBx89_kQR9Htqb8VokuIrB5NCA3cC7ps",
            authDomain: "drake130-8d318.firebaseapp.com",
            projectId: "drake130-8d318",
            storageBucket: "drake130-8d318.firebasestorage.app",
            messagingSenderId: "135705807210",
            appId: "1:135705807210:web:565ef99d75badba6ed3d13",
            measurementId: "G-9CTSC196W7"
        };

        const APP_ID = "drake130-app";
        let app, auth, db;
        let sites = [];
        let deleteTargetId = null;
        let editTargetId = null;

        async function initFirebase() {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                await signInAnonymously(auth);

                onAuthStateChanged(auth, (user) => {
                    if (!user) return;
                    const indicator = document.getElementById('status-indicator');
                    const statusText = document.getElementById('status-text');
                    indicator.className = "w-2.5 h-2.5 rounded-full bg-green-500 animate-pulse";
                    statusText.textContent = "Cloud Active";

                    const sitesCol = collection(db, 'artifacts', APP_ID, 'public', 'data', 'monitoring_sites');
                    onSnapshot(sitesCol, (snap) => {
                        sites = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        renderSites();
                    }, (err) => {
                        showToast(`데이터 연동 실패: ${err.message}`, true);
                    });
                });
            } catch (error) {
                document.getElementById('status-text').textContent = "Auth Error";
                document.getElementById('status-indicator').className = "w-2.5 h-2.5 rounded-full bg-red-500";
                showToast(`인증 에러: ${error.message}`, true);
            }
        }

        // 사이트 추가
        window.addSite = async () => {
            if (!auth?.currentUser) { showToast("로그인 처리 중입니다."); return; }
            const name = document.getElementById('new-site-name').value.trim();
            const url = document.getElementById('new-site-url').value.trim();
            if (!name || !url) { showToast("이름과 URL을 모두 입력해주세요."); return; }
            const siteId = Date.now().toString();
            try {
                await setDoc(
                    doc(db, 'artifacts', APP_ID, 'public', 'data', 'monitoring_sites', siteId),
                    { name, url, items: [], newItems: [], createdAt: new Date().toISOString(), lastUpdated: null }
                );
                document.getElementById('new-site-name').value = '';
                document.getElementById('new-site-url').value = '';
                toggleModal(false);
                showToast("등록 완료. 다음 정시 스캔에 반영됩니다.");
            } catch (e) { showToast(`저장 실패: ${e.message}`, true); }
        };

        // 수정 모달 열기
        window.openEditModal = (id) => {
            const site = sites.find(s => s.id === id);
            if (!site) return;
            editTargetId = id;
            document.getElementById('edit-site-name').value = site.name || '';
            document.getElementById('edit-site-url').value = site.url || '';
            document.getElementById('edit-modal').classList.remove('hidden');
            lucide.createIcons();
        };

        // 수정 모달 닫기
        window.closeEditModal = () => {
            document.getElementById('edit-modal').classList.add('hidden');
            editTargetId = null;
        };

        // 수정 저장
        window.saveSiteEdit = async () => {
            if (!editTargetId) return;
            const name = document.getElementById('edit-site-name').value.trim();
            const url = document.getElementById('edit-site-url').value.trim();
            if (!name || !url) { showToast("이름과 URL을 모두 입력해주세요."); return; }

            const site = sites.find(s => s.id === editTargetId);
            const urlChanged = site && site.url !== url;

            try {
                const updateData = { name, url };
                // URL이 바뀌면 기존 크롤링 데이터 초기화 (새 URL로 다시 스캔)
                if (urlChanged) {
                    updateData.items = [];
                    updateData.newItems = [];
                    updateData.lastUpdated = null;
                    updateData.lastError = null;
                }
                await updateDoc(
                    doc(db, 'artifacts', APP_ID, 'public', 'data', 'monitoring_sites', editTargetId),
                    updateData
                );
                closeEditModal();
                showToast(urlChanged ? "수정 완료. 다음 스캔에서 새로 크롤링됩니다." : "수정 완료.");
            } catch (e) { showToast(`수정 실패: ${e.message}`, true); }
        };

        // 삭제
        window.deleteSite = (id) => {
            deleteTargetId = id;
            document.getElementById('confirm-modal').classList.remove('hidden');
            document.getElementById('confirm-delete-btn').onclick = async () => {
                try {
                    await deleteDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'monitoring_sites', deleteTargetId));
                    closeConfirm();
                    showToast("삭제되었습니다.");
                } catch (e) { showToast("삭제 중 오류가 발생했습니다.", true); }
            };
        };

        window.toggleModal = (show) => document.getElementById('modal').classList.toggle('hidden', !show);
        window.closeConfirm = () => {
            document.getElementById('confirm-modal').classList.add('hidden');
            deleteTargetId = null;
        };

        let toastTimeout = null;
        window.showToast = (msg, isPersistent = false) => {
            const t = document.getElementById('toast');
            document.getElementById('toast-message').textContent = msg;
            document.getElementById('toast-icon').style.color = isPersistent ? "#ef4444" : "#60a5fa";
            t.classList.remove('hidden');
            if (toastTimeout) clearTimeout(toastTimeout);
            if (!isPersistent) toastTimeout = setTimeout(() => t.classList.add('hidden'), 4000);
        };
        window.hideToast = () => document.getElementById('toast').classList.add('hidden');

        function getGradient(name) {
            const colors = ['from-blue-600 to-indigo-700', 'from-purple-600 to-pink-700', 'from-emerald-600 to-teal-700', 'from-orange-600 to-red-700', 'from-slate-800 to-black'];
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }

        function fmtTime(iso) {
            if (!iso) return '대기 중';
            const d = new Date(iso);
            return d.toLocaleString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function renderSites() {
            const grid = document.getElementById('site-grid');
            if (!grid) return;

            if (sites.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-32 text-center bg-white/50 border-2 border-dashed border-slate-300 rounded-[2.5rem] backdrop-blur-sm">
                        <i data-lucide="globe" class="w-16 h-16 text-slate-300 mx-auto mb-4"></i>
                        <h3 class="text-xl font-bold text-slate-400">등록된 사이트가 없습니다.</h3>
                    </div>`;
                lucide.createIcons();
                return;
            }

            grid.innerHTML = sites.map(site => {
                let host = "";
                try { host = new URL(site.url).hostname; } catch (e) {}
                const newItems = site.newItems || [];
                const newCount = newItems.length;
                const hasError = !!site.lastError;

                // 신규 상품이 있으면 신규만, 없으면 전체 items 표시
                const displayItems = newCount > 0 ? newItems : (site.items || []);
                const showingNew = newCount > 0;

                return `
                <div class="group bg-white rounded-[2.5rem] shadow-sm border border-slate-200 overflow-hidden flex flex-col transition-all duration-500 hover:shadow-2xl hover:-translate-y-2 ${hasError ? 'ring-2 ring-red-100' : ''}">
                    <div class="p-8 bg-gradient-to-br ${getGradient(site.name)} text-white relative">
                        <div class="flex justify-between items-start mb-6">
                            <div class="flex items-center gap-2 bg-white/20 backdrop-blur-md px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Server Sync</div>
                            <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onclick="openEditModal('${site.id}')" class="p-2 hover:bg-white/20 rounded-xl" title="수정">
                                    <i data-lucide="pencil" class="w-4 h-4"></i>
                                </button>
                                <button onclick="deleteSite('${site.id}')" class="p-2 hover:bg-white/20 rounded-xl" title="삭제">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        <h3 class="text-3xl font-black mb-1 drop-shadow-md leading-none truncate">${site.name}</h3>
                        <div class="flex items-center gap-1.5 text-white/80 text-xs font-medium">
                            <i data-lucide="globe" class="w-3 h-3"></i>
                            <span class="truncate opacity-70">${host}</span>
                        </div>
                    </div>
                    <div class="p-8 flex-1 flex flex-col bg-white">
                        <div class="flex items-center justify-between mb-6">
                            <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                                ${showingNew
                                    ? `<span class="text-blue-500">🆕 신규 ${newCount}건</span>`
                                    : `Latest Items`}
                            </h4>
                            ${showingNew ? `<span class="text-[9px] text-slate-300 font-bold">다음 스캔 시 갱신</span>` : ''}
                        </div>
                        <div class="space-y-3 flex-1 overflow-y-auto max-h-[350px] pr-2 custom-scrollbar">
                            ${displayItems.length > 0 ? displayItems.map(item => `
                                <a href="${item.link}" target="_blank" class="group/item flex items-center justify-between p-5 bg-slate-50 hover:bg-slate-900 border border-slate-100 rounded-3xl transition-all duration-300">
                                    <div class="flex flex-col gap-1 min-w-0">
                                        <div class="flex items-center gap-2">
                                            ${showingNew ? '<span class="bg-blue-600 text-[8px] text-white px-2 py-0.5 rounded-full font-black shadow-sm shadow-blue-200 shrink-0">NEW</span>' : ''}
                                            <span class="text-[13px] font-bold ${showingNew ? 'text-blue-600' : 'text-slate-800'} group-hover/item:text-white truncate transition-colors">${item.name}</span>
                                        </div>
                                    </div>
                                    <i data-lucide="external-link" class="w-3.5 h-3.5 text-slate-300 group-hover/item:text-white/50 shrink-0 ml-2"></i>
                                </a>
                            `).join('') : '<div class="py-16 text-center opacity-30 text-[10px] font-black font-sans">스캔 대기 중</div>'}
                        </div>
                        ${hasError ? `<div class="mt-6 p-3 bg-red-50 text-red-600 text-[11px] font-bold rounded-2xl">⚠ ${site.lastError}</div>` : ''}
                        <div class="mt-6 pt-5 border-t border-slate-50 flex items-center justify-between text-[9px] font-black text-slate-400 tracking-wider">
                            <span class="flex items-center gap-1 ${hasError ? 'text-red-500' : 'text-green-500'}">${hasError ? 'SYNC ERROR' : 'SYNC OK'}</span>
                            <span>${fmtTime(site.lastUpdated)}</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        window.onload = () => {
            initFirebase();
            lucide.createIcons();
        };
    </script>
</body>
</html>
